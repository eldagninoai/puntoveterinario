<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#F0F7F8"/>
  <!-- Floor -->
  <rect x="0" y="420" width="800" height="180" fill="#E8F0F1"/>
  <!-- Back wall -->
  <rect x="50" y="80" width="700" height="340" rx="8" fill="#fff" stroke="#D0E0E2" stroke-width="2"/>
  <!-- Logo on wall -->
  <circle cx="400" cy="160" r="40" fill="#2bb3c0" opacity="0.15"/>
  <text x="400" y="167" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#2bb3c0" font-weight="700">PV</text>
  <!-- Reception desk -->
  <rect x="200" y="320" width="400" height="100" rx="10" fill="#2bb3c0"/>
  <rect x="210" y="330" width="380" height="10" rx="3" fill="#239AA5"/>
  <!-- Computer on desk -->
  <rect x="340" y="270" width="120" height="80" rx="5" fill="#333"/>
  <rect x="345" y="275" width="110" height="60" rx="3" fill="#4A90D9"/>
  <rect x="380" y="350" width="40" height="15" rx="2" fill="#555"/>
  <!-- Plant -->
  <rect x="600" y="340" width="30" height="60" rx="4" fill="#E8C49A"/>
  <circle cx="615" cy="330" r="25" fill="#4CAF50"/>
  <circle cx="600" cy="320" r="18" fill="#66BB6A"/>
  <circle cx="630" cy="325" r="15" fill="#43A047"/>
  <!-- Chair -->
  <rect x="120" y="360" width="50" height="40" rx="8" fill="#f15a24" opacity="0.7"/>
  <rect x="125" y="400" width="10" height="20" rx="2" fill="#C4491C"/>
  <rect x="155" y="400" width="10" height="20" rx="2" fill="#C4491C"/>
  <!-- Text -->
  <text x="400" y="560" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" fill="#888" font-weight="500">Recepción</text>
</svg>
