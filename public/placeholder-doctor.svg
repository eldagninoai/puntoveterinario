<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="20" fill="#FFF3E8"/>
  <!-- Hair -->
  <path d="M140 120 Q150 80 200 75 Q250 80 260 120 Q262 135 260 140 L140 140 Q138 135 140 120Z" fill="#2C1B0E"/>
  <!-- Face -->
  <circle cx="200" cy="155" r="60" fill="#E8C49A"/>
  <!-- Short hair sides -->
  <rect x="137" y="115" width="12" height="40" rx="6" fill="#2C1B0E"/>
  <rect x="251" y="115" width="12" height="40" rx="6" fill="#2C1B0E"/>
  <!-- Eyes -->
  <ellipse cx="180" cy="150" rx="6" ry="7" fill="#2C1B0E"/>
  <ellipse cx="220" cy="150" rx="6" ry="7" fill="#2C1B0E"/>
  <circle cx="178" cy="148" r="2" fill="#fff"/>
  <circle cx="218" cy="148" r="2" fill="#fff"/>
  <!-- Eyebrows -->
  <path d="M168 136 Q178 130 190 134" stroke="#2C1B0E" stroke-width="3" fill="none"/>
  <path d="M210 134 Q222 130 232 136" stroke="#2C1B0E" stroke-width="3" fill="none"/>
  <!-- Smile -->
  <path d="M185 175 Q200 186 215 175" stroke="#A0724A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Beard hint -->
  <path d="M170 185 Q200 200 230 185" stroke="#2C1B0E" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Neck -->
  <rect x="188" y="210" width="24" height="25" rx="5" fill="#E8C49A"/>
  <!-- Lab coat body -->
  <path d="M130 240 Q130 230 160 225 L188 225 L200 240 L212 225 L240 225 Q270 230 270 240 L280 370 L120 370 Z" fill="#fff"/>
  <!-- Coat collar -->
  <path d="M170 225 L200 260 L230 225" fill="none" stroke="#E0E0E0" stroke-width="2"/>
  <!-- Scrubs under coat -->
  <path d="M175 240 L200 265 L225 240" fill="#f15a24" opacity="0.5"/>
  <!-- Stethoscope -->
  <path d="M230 250 Q245 280 235 310" stroke="#666" stroke-width="3" fill="none"/>
  <circle cx="235" cy="315" r="8" stroke="#666" stroke-width="3" fill="#888"/>
  <circle cx="235" cy="315" r="3" fill="#555"/>
  <!-- Name tag -->
  <rect x="145" y="275" width="35" height="18" rx="3" fill="#f15a24"/>
  <rect x="150" y="280" width="25" height="3" rx="1" fill="#fff"/>
  <rect x="150" y="285" width="18" height="3" rx="1" fill="#fff" opacity="0.6"/>
  <!-- Text -->
  <text x="200" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f15a24" font-weight="600">Dr. Veterinario</text>
</svg>
